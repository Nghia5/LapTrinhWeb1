<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Đào Tạo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        .sidebar { min-height: 100vh; background: white; border-right: 1px solid #dee2e6; }
        .nav-link { color: #333; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .nav-link.active { background-color: #0d6efd !important; color: white !important; font-weight: bold; }
        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-3 shadow-sm">
            <h4 class="text-center text-primary fw-bold mb-4">HỆ THỐNG<br>QUẢN LÝ</h4>
            <div class="nav flex-column nav-pills">
                <a class="nav-link active" id="menu-sv" onclick="changeTab('sv')">🎓 Sinh viên (n1)</a>
                <a class="nav-link" id="menu-gv" onclick="changeTab('gv')">👨‍🏫 Giảng viên (n3)</a>
                <hr>
                <a href="/logout" class="nav-link text-danger">🚪 Đăng xuất</a>
            </div>
        </div>

        <div class="col-md-10 p-4">
            <div id="content-sinhvien" class="content-section active">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h3 class="text-primary text-center mb-4">🎓 Quản Lý Sinh Viên</h3>
                        
                        <div class="d-flex justify-content-between mb-3">
                            <div class="d-flex w-50">
                                <input type="text" id="searchSV" class="form-control me-2" placeholder="Tìm theo tên..." onkeyup="searchStudent()">
                                <button class="btn btn-outline-primary" onclick="searchStudent()">Tìm</button>
                            </div>
                            <a href="/students/new" class="btn btn-success">+ Thêm sinh viên</a>
                        </div>

                        <table class="table table-hover table-bordered align-middle">
                            <thead class="table-primary text-center">
                                <tr><th>ID</th><th>Họ và Tên</th><th>Email</th><th>Hành động</th></tr>
                            </thead>
                            <tbody id="studentTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="content-giangvien" class="content-section">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h3 class="text-primary text-center mb-4">👨‍🏫 Quản Lý Giảng Viên - Nhân Sự</h3>
                        <div class="d-flex justify-content-between mb-3">
                            <form th:action="@{/}" method="get" class="d-flex w-50">
                                <input class="form-control me-2" type="search" name="keyword" placeholder="Tìm theo tên..." th:value="${keyword}">
                                <input type="hidden" name="tab" value="gv">
                                <button class="btn btn-outline-primary" type="submit">Tìm</button>
                            </form>
                            <a th:href="@{/lecturers/new}" class="btn btn-success">+ Thêm giảng viên</a>
                        </div>
                        <table class="table table-hover table-bordered align-middle">
                            <thead class="table-primary text-center">
                                <tr><th>Mã GV</th><th>Họ và Tên</th><th>Khoa</th><th>Email</th><th>Hành động</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="l : ${lecturers}">
                                    <td th:text="${l.lecturerCode}" class="text-center fw-bold"></td>
                                    <td th:text="${l.fullName}" class="fw-bold text-primary"></td>
                                    <td th:text="${l.department != null ? l.department.name : 'N/A'}"></td>
                                    <td th:text="${l.email}"></td>
                                    <td class="text-center">
                                        <a th:href="@{/lecturers/edit/{id}(id=${l.id})}" class="btn btn-warning btn-sm">Sửa</a>
                                        <a th:href="@{/lecturers/delete/{id}(id=${l.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Xóa?')">Xóa</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API = "/api/students";

    function changeTab(tab) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if (tab === 'sv') {
            document.getElementById('content-sinhvien').classList.add('active');
            document.getElementById('menu-sv').classList.add('active');
        } else {
            document.getElementById('content-giangvien').classList.add('active');
            document.getElementById('menu-gv').classList.add('active');
        }
    }

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('tab') === 'gv' || params.get('keyword')) changeTab('gv');
        loadStudents();
    };

    function loadStudents() {
        fetch(API).then(res => res.json()).then(data => renderTable(data));
    }

    function renderTable(data) {
        let html = "";
        data.forEach(s => {
            html += `<tr>
                <td class="text-center">${s.id}</td>
                <td class="fw-bold text-primary">${s.name}</td>
                <td>${s.email}</td>
                <td class="text-center">
                    <button class="btn btn-danger btn-sm" onclick="deleteStudent(${s.id})">Xóa</button>
                </td>
            </tr>`;
        });
        document.getElementById("studentTable").innerHTML = html;
    }

    function deleteStudent(id) {
        if(confirm("Xóa sinh viên này?")) fetch(API + "/" + id, { method: "DELETE" }).then(() => loadStudents());
    }

    function searchStudent() {
        const keyword = document.getElementById("searchSV").value.toLowerCase();
        fetch(API).then(res => res.json()).then(data => {
            renderTable(data.filter(s => s.name.toLowerCase().includes(keyword)));
        });
    }
</script>
</body>
</html>
