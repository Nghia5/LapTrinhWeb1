<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Giảng viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

<div class="container mt-4">
    <div class="d-flex justify-content-end align-items-center py-2 border-bottom mb-4">
        <span class="me-3">Xin chào!</span>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-12">
            <h1 class="text-primary text-center mb-4">🎓 Quản Lý Giảng Viên - Nhân Sự</h1>
            
            <div class="row mb-4 align-items-center">
                <div class="col-md-6">
                    <form th:action="@{/lecturers}" method="get" class="d-flex">
                        <input class="form-control me-2" type="search" name="keyword" 
                               placeholder="Tìm theo tên hoặc email..." 
                               th:value="${keyword}">
                        <button class="btn btn-outline-primary" type="submit">
                            <i class="bi bi-search"></i> Tìm
                        </button>
                    </form>
                </div>
                
                <div class="col-md-6 text-end">
                    <a th:href="@{/lecturers/new}" class="btn btn-success">
                        <i class="bi bi-person-plus-fill"></i> Thêm giảng viên
                    </a>
                </div>
            </div>

            <table class="table table-hover table-bordered align-middle shadow-sm">
                <thead class="table-primary text-center">
                    <tr>
                        <th>Mã GV</th> 
                        <th>Họ và Tên</th>
                        <th>Khoa / Viện</th>       <th>Chức danh</th>         <th>Email</th>
                        <th>Số điện thoại</th> 
                        <th style="width: 150px;">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="lecturer : ${lecturers}">
                        <td class="text-center fw-bold" th:text="${lecturer.lecturerCode}">GV01</td>
                        <td th:text="${lecturer.fullName}" class="fw-bold text-primary">Nguyễn Văn A</td>
                        
                        <td th:text="${lecturer.department != null ? lecturer.department.name : 'Chưa cập nhật'}">CNTT</td>
                        <td th:text="${lecturer.position != null ? lecturer.position.name : 'Chưa cập nhật'}">Tiến sĩ</td>
                        
                        <td th:text="${lecturer.email}">email@example.com</td>
                        <td class="text-center" th:text="${lecturer.phone}">0905xxxxxx</td>
                        
                        <td class="text-center">
                            <a th:href="@{/lecturers/edit/{id}(id=${lecturer.id})}" 
                               class="btn btn-warning btn-sm me-1" title="Sửa">
                                <i class="bi bi-pencil-square"></i>
                            </a>
                            <a th:href="@{/lecturers/delete/{id}(id=${lecturer.id})}" 
                               class="btn btn-danger btn-sm" 
                               onclick="return confirm('Bạn có chắc chắn muốn xóa giảng viên này?')"
                               title="Xóa">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div th:if="${lecturers.empty}" class="alert alert-warning text-center mt-3 shadow-sm">
                <i class="bi bi-exclamation-triangle"></i> Không tìm thấy giảng viên nào.
            </div>
            
            <div th:if="${keyword != null and keyword != ''}" class="text-center mt-3">
                <a th:href="@{/lecturers}" class="btn btn-secondary btn-sm">Quay lại danh sách</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
